<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход и регистрация — Следы прошлого</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .auth-wrap {
      max-width: 460px;
      margin: 48px auto 80px;
      padding: 0 16px;
    }
    .auth-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 28px 24px;
      box-shadow: var(--shadow-sm);
    }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 18px; }
    .auth-tab {
      flex: 1;
      border: 1px solid var(--c-border);
      border-radius: 999px;
      background: var(--c-surface);
      padding: 8px 12px;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--c-text-muted);
    }
    .auth-tab.active { background: var(--c-accent); color: #fff; border-color: var(--c-accent); }
    .auth-status { min-height: 18px; margin-bottom: 12px; font-size: .8125rem; font-weight: 500; }
    .auth-status.error { color: var(--c-danger); }
    .auth-status.success { color: var(--c-success); }
  </style>
</head>
<body>
  <nav class="nav"></nav>

  <main class="auth-wrap">
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" type="button">Вход</button>
        <button class="auth-tab" id="tab-register" type="button">Регистрация</button>
      </div>
      <p class="auth-status" id="auth-status"></p>

      <div class="form-group hidden" id="name-wrap">
        <label class="form-label" for="auth-name">Имя</label>
        <input id="auth-name" class="form-control" maxlength="120" autocomplete="name" />
      </div>

      <div class="form-group">
        <label class="form-label" for="auth-email">Электронная почта</label>
        <input id="auth-email" type="email" class="form-control" maxlength="254" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="auth-password">Пароль</label>
        <input id="auth-password" type="password" class="form-control" autocomplete="new-password" />
      </div>

      <button class="btn btn--primary btn--full" id="auth-submit">Войти</button>
    </div>
  </main>

  <script type="module" src="js/scroll.js"></script>
  <script type="module" src="js/transitions.js"></script>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
