<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <title>Чат — Следы прошлого</title>
  <meta name="description" content="Чат с историческим гидом: задавайте вопросы о памятниках, событиях, архитектуре и культурном наследии." />
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .chat-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 780px;
      width: 100%;
      margin: 0 auto;
      padding: 0 24px;
      min-height: 0;
    }

    /* ── header ── */
    .chat-header {
      padding: 20px 0 16px;
      border-bottom: 1px solid var(--c-border-light);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .chat-header__icon {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: var(--c-accent-soft);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: var(--c-accent);
    }
    .chat-header__text {}
    .chat-header__title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 600;
      line-height: 1.2;
    }
    .chat-header__sub {
      font-size: .78rem;
      color: var(--c-text-muted);
      margin-top: 2px;
    }

    /* ── messages ── */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 24px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-height: 0;
    }

    /* welcome screen */
    .chat-welcome {
      margin: auto;
      text-align: center;
      padding: 32px 0;
      max-width: 420px;
    }
    .chat-welcome__icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--c-accent-soft);
      margin: 0 auto 18px;
      display: flex; align-items: center; justify-content: center;
      color: var(--c-accent);
    }
    .chat-welcome__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .chat-welcome__sub {
      font-size: .9rem;
      color: var(--c-text-muted);
      line-height: 1.65;
      margin: 0 auto;
    }
    .chat-welcome__hints {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .chat-hint {
      padding: 12px 18px;
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-md);
      font-size: .875rem;
      font-weight: 400;
      color: var(--c-text-muted);
      cursor: pointer;
      text-align: left;
      transition: border-color var(--transition), color var(--transition), background var(--transition), box-shadow var(--transition);
      background: var(--c-surface);
      width: 100%;
      font-family: var(--font-body);
    }
    .chat-hint:hover {
      border-color: var(--c-accent);
      color: var(--c-accent);
      background: var(--c-accent-soft);
      box-shadow: var(--shadow-xs);
    }

    /* message bubbles */
    .msg {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      animation: fadeUp .25s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg--user { flex-direction: row-reverse; }

    .msg__avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .02em;
      border: 1px solid var(--c-border-light);
      background: var(--c-surface);
      color: var(--c-text-muted);
    }
    .msg--user .msg__avatar {
      background: var(--c-accent);
      color: #fff;
      border-color: var(--c-accent);
    }

    .msg__bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      font-size: .9375rem;
      line-height: 1.7;
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      color: var(--c-text);
      box-shadow: var(--shadow-xs);
    }
    .msg__bubble p { margin: 0; }
    .msg__bubble p + p { margin-top: .6em; }
    .msg--user .msg__bubble {
      background: var(--c-accent);
      border-color: var(--c-accent);
      color: #fff;
      box-shadow: none;
    }
    .msg__route-box {
      margin-top: 10px;
      border-top: 1px solid var(--c-border-light);
      padding-top: 10px;
      font-size: .84rem;
    }
    .msg__route-title { font-weight: 700; margin-bottom: 6px; }
    .msg__route-list { margin: 0; padding-left: 18px; }
    .msg__route-list li + li { margin-top: 2px; }
    .msg__route-filters { margin-top: 8px; color: var(--c-text-muted); }
    .msg__route-actions { margin-top: 10px; }

    /* loading dots */
    .msg__bubble--loading {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 20px;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--c-accent-tag);
      animation: bounce .9s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(.7); opacity: .4; }
      40%           { transform: scale(1);  opacity: 1;  }
    }

    /* ── input area ── */
    .chat-input-wrap {
      flex-shrink: 0;
      padding: 16px 0 24px;
      border-top: 1px solid var(--c-border-light);
    }
    .chat-input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--c-border);
      border-radius: var(--radius-md);
      font-size: .9375rem;
      font-weight: 400;
      font-family: var(--font-body);
      color: var(--c-text);
      background: var(--c-surface);
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .chat-input:focus { border-color: var(--c-accent); box-shadow: 0 0 0 3px var(--c-accent-soft); }
    .chat-input::placeholder { color: var(--c-text-light); }

    .chat-send {
      width: 44px; height: 44px;
      border-radius: var(--radius-md);
      background: var(--c-accent);
      color: #fff;
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background var(--transition), opacity var(--transition), box-shadow var(--transition);
    }
    .chat-send:hover { background: var(--c-accent-hover); box-shadow: var(--shadow-sm); }
    .chat-send:disabled { opacity: .35; cursor: not-allowed; }

    .chat-status {
      margin-top: 8px;
      font-size: .78rem;
      color: var(--c-text-muted);
      min-height: 18px;
      text-align: center;
    }
    .chat-status.error { color: var(--c-danger); }

    @media (max-width: 600px) {
      .chat-wrap { padding: 0 16px; }
      .chat-header { padding: 14px 0 12px; }
      .chat-header__icon { width: 36px; height: 36px; }
      .chat-header__title { font-size: 1.05rem; }
      .chat-welcome { padding: 20px 0; }
      .chat-welcome__title { font-size: 1.25rem; }
      .msg__bubble { max-width: 85%; font-size: .875rem; }
    }
  </style>
</head>
<body data-no-lenis="true">

  <nav class="nav"></nav>

  <div class="chat-wrap">
    <div class="chat-header">
      <div class="chat-header__icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <div class="chat-header__text">
        <h1 class="chat-header__title" data-i18n="chat.headerTitle">Исторический гид</h1>
        <p class="chat-header__sub" data-i18n="chat.headerSub">Задайте вопрос об истории, памятниках или культурном наследии</p>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="chat-welcome" id="welcome">
        <div class="chat-welcome__icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a10 10 0 0 1 10 10c0 5.52-4.48 10-10 10S2 17.52 2 12 6.48 2 12 2z"/>
            <path d="M12 16v-4M12 8h.01"/>
          </svg>
        </div>
        <h2 class="chat-welcome__title" data-i18n="chat.welcomeTitle">С чего начнём?</h2>
        <p class="chat-welcome__sub" data-i18n="chat.welcomeSub">Я знаю об исторических местах, событиях, архитектуре и культурном наследии. Спросите меня о чём угодно из этих тем.</p>
        <div class="chat-welcome__hints">
          <button class="chat-hint" data-i18n="chat.hint1">Расскажи о Колизее в Риме</button>
          <button class="chat-hint" data-i18n="chat.hint2">Что произошло в Сталинградской битве?</button>
          <button class="chat-hint" data-i18n="chat.hint3">Какие памятники есть в Петербурге?</button>
        </div>
      </div>
    </div>

    <div class="chat-input-wrap">
      <div class="chat-input-row">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Напишите вопрос об истории…"
          data-i18n-placeholder="chat.inputPlaceholder"
          rows="1"
          maxlength="2000"
        ></textarea>
        <button class="chat-send" id="send-btn" disabled aria-label="Отправить" data-i18n-aria-label="chat.sendAria">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <p class="chat-status" id="chat-status"></p>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="../js/scroll.js"></script>
  <script type="module" src="../js/transitions.js"></script>
  <script type="module" src="../js/pages/chat.js"></script>
</body>
</html>
