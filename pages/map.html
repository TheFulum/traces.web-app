<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <title>Карта — Следы прошлого</title>
  <meta name="description" content="Интерактивная карта памятных мест с поиском по адресам и быстрым переходом к страницам объектов." />
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <style>
    body { overflow: hidden; }

    .map-wrap {
      position: relative;
      height: calc(100svh - var(--nav-h));
      min-height: 280px;
      width: 100%;
    }

    @supports (height: 100dvh) {
      .map-wrap {
        height: calc(100dvh - var(--nav-h));
      }
    }

    #map {
      width: 100%;
      height: 100%;
      background: var(--c-accent-soft);
    }

    .leaflet-top.leaflet-left {
      top: auto;
      bottom: 24px;
    }
    .leaflet-control-zoom {
      margin-left: 16px !important;
      margin-top: 0 !important;
      border: 1px solid var(--c-border-light) !important;
      border-radius: var(--radius-md) !important;
      box-shadow: var(--shadow-md) !important;
      overflow: hidden;
    }
    .leaflet-control-zoom a {
      width: 34px !important;
      height: 34px !important;
      line-height: 34px !important;
      color: var(--c-text) !important;
      background: var(--c-surface) !important;
      border: none !important;
      font-weight: 600;
    }
    .leaflet-control-zoom a:hover {
      background: var(--c-accent-soft) !important;
      color: var(--c-accent) !important;
    }

    /* ── search panel ── */
    .map-search {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      width: min(480px, calc(100vw - 32px));
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-lg);
      overflow: hidden;
    }
    .map-search__row {
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      background: var(--c-surface);
    }
    .map-search__row svg { color: var(--c-text-light); flex-shrink: 0; }
    .map-search__input {
      flex: 1;
      border: none;
      outline: none;
      padding: 14px 0 14px 0;
      font-size: .9375rem;
      font-weight: 400;
      background: transparent;
      color: var(--c-text);
      appearance: none;
      -webkit-appearance: none;
      caret-color: var(--c-accent);
    }
    .map-search__input::-ms-clear,
    .map-search__input::-ms-reveal { display: none; width: 0; height: 0; }
    .map-search__input::-webkit-search-cancel-button,
    .map-search__input::-webkit-search-decoration { display: none; }
    .map-search__input::placeholder { color: var(--c-text-light); }
    .map-search__input:focus,
    .map-search__input:focus-visible {
      outline: none !important;
      box-shadow: none !important;
    }
    .map-search__clear {
      color: var(--c-text-muted);
      width: 24px;
      height: 24px;
      padding: 0;
      border-radius: 999px;
      display: none;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
      cursor: pointer;
      background: #fff;
      border: 1px solid var(--c-border);
      align-items: center;
      justify-content: center;
    }
    .map-search__clear:hover {
      color: var(--c-text);
      border-color: var(--c-accent);
      background: var(--c-accent-soft);
    }
    .map-search__clear.visible { display: flex; }
    .map-search__clear:focus,
    .map-search__clear:focus-visible {
      outline: none !important;
      box-shadow: none !important;
    }

    .map-search__results {
      border-top: 1px solid var(--c-border-light);
      max-height: 240px;
      overflow-y: auto;
      display: none;
    }
    .map-search__results.open { display: block; }
    .map-search__result {
      padding: 11px 16px;
      font-size: .875rem;
      cursor: pointer;
      border-bottom: 1px solid var(--c-border-light);
      transition: background var(--transition);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .map-search__result:last-child { border-bottom: none; }
    .map-search__result:hover { background: var(--c-accent-soft); }
    .map-search__result svg { flex-shrink: 0; margin-top: 2px; color: var(--c-text-light); }
    .map-search__result-name { font-weight: 500; line-height: 1.3; }
    .map-search__result-addr { font-size: .8rem; color: var(--c-text-muted); margin-top: 2px; }
    .map-search__result-type {
      display: inline-flex;
      margin-left: 6px;
      font-size: .68rem;
      line-height: 1;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--c-accent);
      background: var(--c-accent-soft);
      border: 1px solid var(--c-border-light);
      border-radius: 999px;
      padding: 3px 7px;
      vertical-align: middle;
    }
    .map-search__divider {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      color: var(--c-text-light);
      font-size: .72rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      background: var(--c-surface-warm);
      border-top: 1px solid var(--c-border-light);
      border-bottom: 1px solid var(--c-border-light);
    }
    .map-search__divider::before,
    .map-search__divider::after {
      content: '';
      height: 1px;
      background: var(--c-border);
      flex: 1;
    }
    .map-search__msg {
      padding: 14px 16px;
      font-size: .875rem;
      color: var(--c-text-muted);
      text-align: center;
    }

    /* ── custom marker ── */
    .marker-pin {
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      background: var(--c-accent);
      transform: rotate(-45deg);
      border: 2px solid #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
    }
    .marker-pin:hover {
      transform: rotate(-45deg) scale(1.15);
      box-shadow: 0 4px 12px rgba(0,0,0,.35);
    }

    /* ── popup ── */
    .leaflet-popup-content-wrapper {
      border-radius: var(--radius-md) !important;
      box-shadow: var(--shadow-lg) !important;
      border: 1px solid var(--c-border-light) !important;
      padding: 0 !important;
      overflow: hidden;
    }
    .leaflet-popup-content { margin: 0 !important; width: auto !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      top: 8px !important;
      right: 8px !important;
      width: 28px !important;
      height: 28px !important;
      display: grid !important;
      place-items: center !important;
      border-radius: 999px !important;
      background: #fff !important;
      color: #1a1a1a !important;
      border: 1px solid #1a1a1a !important;
      font-size: 18px !important;
      line-height: 1 !important;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      padding: 0 !important;
    }
    .leaflet-popup-close-button:hover {
      background: #fff !important;
      color: #000 !important;
      border-color: #000 !important;
    }

    .map-popup { min-width: 250px; max-width: 320px; }
    .map-popup__media {
      position: relative;
    }
    .map-popup__img {
      width: 100%; height: 150px;
      object-fit: cover; display: block;
      background: var(--c-accent-soft);
    }
    .map-popup__img--placeholder {
      width: 100%; height: 100px;
      background: linear-gradient(135deg, var(--c-accent-soft) 0%, var(--c-surface-warm) 100%);
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem; font-weight: 500; letter-spacing: .1em;
      text-transform: uppercase; color: var(--c-text-light);
    }
    .map-popup__badges {
      position: absolute;
      top: 46px;
      right: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: flex-end;
    }
    .map-popup__badge {
      background: rgba(0,0,0,.58);
      backdrop-filter: blur(6px);
      color: #fff;
      font-size: .66rem;
      font-weight: 700;
      letter-spacing: .05em;
      text-transform: uppercase;
      border-radius: 999px;
      padding: 4px 8px;
      line-height: 1;
    }
    .map-popup__badge--photo {
      text-transform: none;
      letter-spacing: .03em;
      font-size: .68rem;
    }
    .map-popup__body { padding: 14px 16px 16px; }
    .map-popup__title {
      font-family: var(--font-display);
      font-size: 1.1rem; font-weight: 500;
      margin-bottom: 6px; line-height: 1.2;
    }
    .map-popup__meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 0 0 9px;
    }
    .map-popup__meta-item {
      font-size: .7rem;
      font-weight: 600;
      color: var(--c-text-muted);
      background: var(--c-surface-warm);
      border: 1px solid var(--c-border-light);
      border-radius: 999px;
      padding: 3px 8px;
      line-height: 1.2;
    }
    .map-popup__addr {
      font-size: .8rem; color: var(--c-text-muted);
      margin-bottom: 12px; line-height: 1.4;
    }
    .map-popup__actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .map-popup__btn {
      display: inline-flex; align-items: center;
      gap: 5px; font-size: .75rem; font-weight: 500;
      letter-spacing: .05em; text-transform: uppercase;
      color: #fff !important; background: var(--c-accent);
      border: none; border-radius: var(--radius-sm);
      padding: 8px 14px; cursor: pointer;
      text-decoration: none;
      transition: background var(--transition);
      width: 100%; justify-content: center;
    }
    .map-popup__btn:hover { background: var(--c-accent-hover); }
    .map-popup__btn--outline {
      background: var(--c-surface);
      color: var(--c-text) !important;
      border: 1px solid var(--c-border);
    }
    .map-popup__btn--outline:hover {
      border-color: var(--c-accent);
      color: var(--c-accent) !important;
      background: var(--c-accent-soft);
    }

    /* ── list button ── */
    .map-list-btn {
      position: absolute;
      bottom: 24px; right: 16px;
      z-index: 1000;
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      padding: 11px 18px;
      font-size: .8rem; font-weight: 500;
      letter-spacing: .05em;
      text-transform: uppercase;
      cursor: pointer;
      display: flex; align-items: center; gap: 7px;
      color: var(--c-text);
      transition: background var(--transition), box-shadow var(--transition);
    }
    .map-list-btn:hover { background: var(--c-accent-soft); box-shadow: var(--shadow-lg); }

    /* ── loading overlay ── */
    .map-loading {
      position: absolute; inset: 0;
      z-index: 900;
      background: var(--c-bg);
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
      font-size: .875rem; font-weight: 500;
      color: var(--c-text-muted);
      letter-spacing: .04em;
    }
    .map-loading.hidden { display: none; }
    .map-loading__spinner {
      width: 32px; height: 32px;
      border: 2px solid var(--c-border);
      border-top-color: var(--c-accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body data-no-lenis="true">

  <!-- nav is injected by JS -->
  <nav class="nav"></nav>

  <div class="map-wrap">

    <!-- loading -->
    <div class="map-loading" id="map-loading">
      <div class="map-loading__spinner"></div>
      <span data-i18n="map.loading">Загрузка карты…</span>
    </div>

    <!-- map container -->
    <div id="map"></div>

    <!-- search -->
    <div class="map-search" id="map-search">
      <div class="map-search__row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input
          type="text"
          id="search-input"
          class="map-search__input"
          placeholder="Поиск по адресу или месту…"
          data-i18n-placeholder="map.searchPlaceholder"
          autocomplete="off"
        />
        <button class="map-search__clear" id="search-clear" aria-label="Очистить" data-i18n-aria-label="map.clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="map-search__results" id="search-results"></div>
    </div>

    <!-- places list button -->
    <button class="map-list-btn" id="list-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/>
        <line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/>
      </svg>
      <span data-i18n="map.allPlaces">Все места</span>
    </button>

  </div>

  <div id="toast" class="toast"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/@maplibre/maplibre-gl-leaflet@0.1.2/leaflet-maplibre-gl.js"></script>
  <script type="module" src="../js/scroll.js"></script>
  <script type="module" src="../js/transitions.js"></script>
  <script type="module" src="../js/pages/map.js"></script>
</body>
</html>
