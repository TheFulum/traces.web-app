<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Личный кабинет — Следы прошлого</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .profile-wrap {
      max-width: 720px;
      margin: 48px auto 80px;
      padding: 0 16px;
      display: grid;
      gap: 14px;
    }
    .profile-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow-sm);
    }
    .profile-status { min-height: 18px; margin-top: 8px; font-size: .8125rem; font-weight: 500; }
    .profile-status.error { color: var(--c-danger); }
    .profile-status.success { color: var(--c-success); }
  </style>
</head>
<body>
  <nav class="nav"></nav>
  <main class="profile-wrap">
    <section class="profile-card">
      <h1 style="margin-bottom:14px">Личный кабинет</h1>
      <div class="form-group">
        <label class="form-label" for="profile-name">Имя</label>
        <input id="profile-name" class="form-control" maxlength="120" />
      </div>
      <div class="form-group">
        <label class="form-label" for="profile-email">Email</label>
        <input id="profile-email" type="email" class="form-control" maxlength="254" />
      </div>
      <button class="btn btn--primary" id="profile-save">Сохранить профиль</button>
      <p class="profile-status" id="profile-status"></p>
    </section>

    <section class="profile-card">
      <h2 style="margin-bottom:14px">Безопасность</h2>
      <div class="form-group">
        <label class="form-label" for="current-password">Текущий пароль</label>
        <input id="current-password" type="password" class="form-control" autocomplete="current-password" />
      </div>
      <div class="form-group">
        <label class="form-label" for="new-password">Новый пароль</label>
        <input id="new-password" type="password" class="form-control" autocomplete="new-password" />
      </div>
      <button class="btn btn--outline" id="password-save">Сменить пароль</button>
      <p class="profile-status" id="security-status"></p>
    </section>

    <section class="profile-card">
      <button class="btn btn--outline" id="logout-btn">Выйти</button>
    </section>

    <section class="profile-card">
      <h2 style="margin-bottom:14px">Мои отзывы</h2>
      <div id="my-reviews-list"></div>
    </section>
  </main>
  <script type="module" src="js/scroll.js"></script>
  <script type="module" src="js/transitions.js"></script>
  <script type="module" src="js/profile.js"></script>
</body>
</html>
