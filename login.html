<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Админ панель</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background: linear-gradient(180deg, var(--c-surface-warm) 0%, var(--c-bg) 100%);
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }
    .login-card__eyebrow {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .login-card__eyebrow::before {
      content: '';
      display: inline-block;
      width: 16px; height: 2px;
      background: var(--c-accent);
      border-radius: 1px;
    }
    .login-card__title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 32px;
    }
    .form-status {
      font-size: .8125rem;
      font-weight: 500;
      color: var(--c-danger);
      min-height: 18px;
      margin-bottom: 16px;
    }
    .login-card__footer {
      margin-top: 24px;
      font-size: .8125rem;
      color: var(--c-text-muted);
      text-align: center;
    }
    .login-card__footer a {
      color: var(--c-accent);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 500;
      transition: color var(--transition);
    }
    .login-card__footer a:hover { color: var(--c-accent-hover); }

    @media (max-width: 480px) {
      .login-card { padding: 28px 24px; }
      .login-card__title { font-size: 1.5rem; margin-bottom: 24px; }
    }
  </style>
</head>
<body>

  <div class="login-card">
    <p class="login-card__eyebrow">Следы прошлого</p>
    <h1 class="login-card__title">Вход</h1>

    <p class="form-status" id="form-status"></p>

    <div class="form-group">
      <label class="form-label" for="email">Электронная почта</label>
      <input type="email" id="email" class="form-control"
        placeholder="admin@example.com" autocomplete="email" />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Пароль</label>
      <input type="password" id="password" class="form-control"
        placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn btn--primary btn--full" id="login-btn">Войти</button>

    <p class="login-card__footer">
      <a href="../index.html">← На сайт</a>
    </p>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
