<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Обратная связь — Следы прошлого</title>
  <meta name="description" content="Свяжитесь с проектом «Следы прошлого», оставьте отзыв и предложения по развитию сервиса." />
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .feedback-wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .feedback-header { margin-bottom: 36px; }
    .feedback-header__eyebrow {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .feedback-header__eyebrow::before {
      content: '';
      display: inline-block;
      width: 20px; height: 2px;
      background: var(--c-accent);
      border-radius: 1px;
    }
    .feedback-header__title {
      margin-bottom: 8px;
      font-weight: 600;
    }
    .feedback-header__sub {
      font-size: .95rem;
      color: var(--c-text-muted);
      line-height: 1.6;
    }

    .feedback-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 32px;
      box-shadow: var(--shadow-sm);
    }

    /* ── stars ── */
    .rating-label {
      font-size: .75rem;
      font-weight: 500;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 10px;
      display: block;
    }
    .stars {
      display: flex;
      gap: 2px;
      margin-bottom: 8px;
      line-height: 1;
      width: fit-content;
    }
    .star {
      font-size: 2.4rem;
      color: var(--c-border);
      cursor: pointer;
      padding: 0 3px;
      background: none;
      border: none;
      transition: transform .12s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .star:hover { transform: scale(1.15); }
    .star.on { color: var(--c-star); }

    .rating-text {
      font-size: .8125rem;
      font-weight: 500;
      color: var(--c-text-muted);
      margin-bottom: 24px;
      min-height: 18px;
    }

    .form-actions {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .form-status { font-size: .8125rem; min-height: 18px; font-weight: 500; }
    .form-status.error   { color: var(--c-danger); }
    .form-status.success { color: var(--c-success); }

    .feedback-success {
      text-align: center;
      padding: 48px 32px;
    }
    .feedback-success__icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--c-accent-soft);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      color: var(--c-accent);
    }
    .feedback-success__title {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .feedback-success__sub {
      font-size: .95rem;
      color: var(--c-text-muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      .feedback-wrap { padding: 32px 16px 60px; }
      .feedback-card { padding: 24px 20px; }
      .star { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <nav class="nav"></nav>

  <div class="feedback-wrap">
    <div class="feedback-header">
      <p class="feedback-header__eyebrow" data-i18n="feedback.eyebrow">Обратная связь</p>
      <h1 class="feedback-header__title" data-i18n="feedback.title">Обратная связь</h1>
      <p class="feedback-header__sub" data-i18n="feedback.subtitle">Ваше мнение помогает нам улучшать приложение и делать его полезнее.</p>
    </div>

    <div class="feedback-card" id="form-card">

      <span class="rating-label" data-i18n="feedback.ratingLabel">Оценка</span>
      <div class="stars" id="stars">
        <button type="button" class="star" data-v="1">★</button>
        <button type="button" class="star" data-v="2">★</button>
        <button type="button" class="star" data-v="3">★</button>
        <button type="button" class="star" data-v="4">★</button>
        <button type="button" class="star" data-v="5">★</button>
      </div>
      <p class="rating-text" id="rating-text"></p>

      <div class="form-group">
        <label class="form-label" for="email" data-i18n="feedback.emailLabel">Электронная почта</label>
        <input type="email" id="email" class="form-control"
          placeholder="you@example.com" maxlength="254" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" for="message" data-i18n="feedback.messageLabel">Сообщение</label>
        <textarea id="message" class="form-control"
          placeholder="Поделитесь впечатлениями или предложениями…"
          maxlength="2000" rows="5" data-i18n-placeholder="feedback.messagePlaceholder"></textarea>
      </div>

      <div class="form-actions">
        <button class="btn btn--primary" id="submit-btn" data-i18n="feedback.submit">Отправить</button>
        <span class="form-status" id="form-status"></span>
      </div>

    </div>
  </div>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span>© 2026 Следы прошлого</span>
        <div class="footer__links">
          <a href="index.html" data-i18n="nav.home">Места</a>
          <a href="map.html" data-i18n="nav.map">Карта</a>
        </div>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/scroll.js"></script>
  <script type="module" src="js/transitions.js"></script>
  <script type="module" src="js/feedback.js"></script>
</body>
</html>
