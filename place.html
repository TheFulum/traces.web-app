<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Place — Traces of the Past</title>
  <meta name="description" content="Подробная страница памятного места: история, автор, дата, фотографии, 3D-модель и отзывы." />
  <meta property="og:title" content="Следы прошлого" id="og-title" />
  <meta property="og:description" content="Подробная страница памятного места проекта «Следы прошлого»." id="og-description" />
  <meta property="og:type" content="article" />
  <meta property="og:image" content="" id="og-image" />
  <meta property="og:url" content="" id="og-url" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Следы прошлого" id="tw-title" />
  <meta name="twitter:description" content="Подробная страница памятного места." id="tw-description" />
  <meta name="twitter:image" content="" id="tw-image" />
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="preconnect" href="https://www.gstatic.com" />
  <link rel="preconnect" href="https://firestore.googleapis.com" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .8125rem;
      font-weight: 500;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin: 28px 0 0;
      transition: color var(--transition), gap var(--transition);
    }
    .back-link:hover { color: var(--c-accent); gap: 10px; }
    .back-link svg { transition: transform var(--transition); }
    .back-link:hover svg { transform: translateX(-3px); }

    .place-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 48px;
      padding: 32px 0 80px;
      align-items: start;
    }
    @media (max-width: 900px) { .place-layout { grid-template-columns: 1fr; gap: 32px; } }

    /* ── gallery ── */
    .gallery { margin-bottom: 32px; }
    .gallery__main-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--c-accent-soft);
      cursor: zoom-in;
    }
    .gallery__main {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .4s ease;
    }
    .gallery__main-wrap:hover .gallery__main { transform: scale(1.03); }
    .gallery__zoom-hint {
      position: absolute;
      bottom: 12px; right: 14px;
      background: rgba(0,0,0,.5);
      backdrop-filter: blur(4px);
      color: #fff;
      font-size: .72rem;
      font-weight: 500;
      letter-spacing: .04em;
      padding: 5px 12px;
      border-radius: 20px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .2s;
    }
    .gallery__main-wrap:hover .gallery__zoom-hint { opacity: 1; }
    .gallery__main--placeholder {
      width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--c-accent-soft) 0%, var(--c-surface-warm) 100%);
      display: flex; align-items: center; justify-content: center;
      color: var(--c-text-light);
      font-size: .8rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase;
    }
    .gallery__thumbs {
      display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;
    }
    .gallery__thumb {
      width: 72px; height: 52px;
      object-fit: cover;
      border-radius: var(--radius-sm);
      cursor: pointer;
      opacity: .5;
      border: 2px solid transparent;
      transition: opacity var(--transition), border-color var(--transition), transform var(--transition);
    }
    .gallery__thumb.active, .gallery__thumb:hover {
      opacity: 1; border-color: var(--c-accent); transform: scale(1.05);
    }

    /* ── fullscreen lightbox ── */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn .2s ease;
    }
    .lightbox.hidden { display: none; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .lightbox__img {
      max-width: 94vw; max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 40px rgba(0,0,0,.6);
    }
    .lightbox__close {
      position: absolute; top: 20px; right: 20px;
      width: 44px; height: 44px;
      background: rgba(255,255,255,.12);
      border: none; border-radius: 50%;
      color: #fff; cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox__close:hover { background: rgba(255,255,255,.25); }
    .lightbox__prev, .lightbox__next {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px;
      background: rgba(255,255,255,.12);
      border: none; border-radius: 50%;
      color: #fff; cursor: pointer; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s;
    }
    .lightbox__prev:hover, .lightbox__next:hover { background: rgba(255,255,255,.25); }
    .lightbox__prev { left: 16px; }
    .lightbox__next { right: 16px; }
    .lightbox__counter {
      position: absolute; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.6);
      font-size: .8125rem; font-weight: 500;
    }

    /* ── description ── */
    .place-description {
      font-size: 1.05rem; line-height: 1.85; color: var(--c-text);
    }
    .place-description p + p { margin-top: 1.2em; }

    /* ── meta sidebar ── */
    .place-meta {
      position: sticky;
      top: calc(var(--nav-h) + 24px);
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 28px 24px 24px;
      box-shadow: var(--shadow-sm);
    }

    .place-meta__eyebrow {
      font-size: .7rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
      color: var(--c-accent); margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .place-meta__eyebrow::before {
      content: '';
      display: inline-block;
      width: 16px; height: 2px;
      background: var(--c-accent);
      border-radius: 1px;
    }

    .place-meta__title {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 600;
      line-height: 1.2; margin-bottom: 20px;
    }
    .place-epoch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .74rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 11px;
      border-radius: 999px;
      background: var(--c-accent-soft);
      border: 1px solid var(--c-border-light);
      color: var(--c-accent);
      margin: -8px 0 16px;
      text-decoration: none;
      transition: border-color var(--transition), color var(--transition);
    }
    .place-epoch:hover {
      border-color: var(--c-accent);
      color: var(--c-accent-hover);
    }

    .meta-row {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: .875rem; color: var(--c-text-muted);
      margin-bottom: 14px; line-height: 1.5;
    }
    .meta-row svg { flex-shrink: 0; margin-top: 2px; color: var(--c-accent-tag); }
    .meta-row strong { color: var(--c-text); font-weight: 500; }
    .meta-row a { color: var(--c-accent); text-decoration: underline; text-underline-offset: 3px; }

    .divider { border: none; border-top: 1px solid var(--c-border-light); margin: 20px 0; }

    /* tags */
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .tag {
      font-size: .78rem; font-weight: 500; padding: 4px 12px;
      border: 1px solid var(--c-accent-soft);
      background: var(--c-accent-soft);
      border-radius: 20px; color: var(--c-accent);
      transition: background var(--transition), border-color var(--transition);
    }
    .tag:hover { border-color: var(--c-accent); }

    /* action buttons */
    .place-actions { display: flex; flex-direction: column; gap: 10px; }
    .btn-route {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 22px;
      background: var(--c-accent); color: #fff;
      border: none; border-radius: var(--radius-sm);
      font-size: .8125rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase;
      cursor: pointer; font-family: var(--font-body);
      transition: background var(--transition), box-shadow var(--transition);
    }
    .btn-route:hover { background: var(--c-accent-hover); box-shadow: var(--shadow-sm); }
    .btn-share {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 12px 22px;
      background: transparent; color: var(--c-text);
      border: 1px solid var(--c-border); border-radius: var(--radius-sm);
      font-size: .8125rem; font-weight: 500; letter-spacing: .04em; text-transform: uppercase;
      cursor: pointer; font-family: var(--font-body);
      transition: border-color var(--transition), color var(--transition);
    }
    .btn-share:hover { border-color: var(--c-accent); color: var(--c-accent); }

    /* map link */
    .place-map-link {
      display: flex; align-items: center; gap: 8px;
      margin-top: 16px;
      font-size: .8125rem; font-weight: 500;
      color: var(--c-accent);
      text-decoration: none;
      letter-spacing: .04em;
      text-transform: uppercase;
      transition: gap var(--transition);
    }
    .place-map-link:hover { gap: 12px; }

    /* ── model ── */
    .model-section { margin-top: 48px; }
    .model-section__label {
      font-size: .75rem; font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      color: var(--c-accent); margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px;
    }
    .model-section__label::before {
      content: '';
      display: inline-block;
      width: 16px; height: 2px;
      background: var(--c-accent);
      border-radius: 1px;
    }
    .model-wrapper {
      width: 100%; aspect-ratio: 16/9;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid var(--c-border-light);
      background: #0d0d0d;
      box-shadow: var(--shadow-md);
    }
    .model-wrapper model-viewer,
    .model-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }

    /* skeleton */
    .place-skeleton { padding: 40px 0 80px; }
    .place-skeleton__img { width: 100%; aspect-ratio: 16/9; border-radius: var(--radius-lg); margin-bottom: 40px; }

    @media (max-width: 900px) {
      .place-meta { position: static; }
    }

    /* ── reviews section ── */
    .reviews-section {
      padding: 48px 0 80px;
    }
    .reviews-section__title {
      font-family: var(--font-display);
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .reviews-form-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 28px 32px 24px;
      box-shadow: var(--shadow-sm);
      max-width: 640px;
      margin-bottom: 40px;
    }
    .reviews-form-card__heading {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-accent);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .reviews-form-card__heading::before {
      content: '';
      display: inline-block;
      width: 16px; height: 2px;
      background: var(--c-accent);
      border-radius: 1px;
    }
    .review-stars {
      display: flex;
      gap: 2px;
      margin-bottom: 6px;
      line-height: 1;
      width: fit-content;
    }
    .review-star {
      font-size: 2rem;
      color: var(--c-border);
      cursor: pointer;
      padding: 0 3px;
      background: none;
      border: none;
      transition: transform .12s, color .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .review-star:hover { transform: scale(1.15); }
    .review-star.on { color: var(--c-star); }
    .review-rating-text {
      font-size: .8125rem;
      font-weight: 500;
      color: var(--c-text-muted);
      margin-bottom: 18px;
      min-height: 18px;
    }
    .review-form-actions {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .reviews-divider {
      border: none;
      border-top: 1px solid var(--c-border-light);
      margin: 0 0 28px;
    }

    /* review cards */
    .review-card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      box-shadow: var(--shadow-xs);
      transition: box-shadow var(--transition);
      margin-bottom: 12px;
    }
    .review-card:hover { box-shadow: var(--shadow-sm); }
    .review-card__header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .review-card__avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--c-accent-soft);
      border: 1px solid var(--c-border-light);
      color: var(--c-accent);
      font-size: .95rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      text-transform: uppercase;
    }
    .review-card__name {
      font-size: .9rem;
      font-weight: 600;
      color: var(--c-text);
      margin-bottom: 2px;
    }
    .review-card__date {
      font-size: .75rem;
      font-weight: 500;
      color: var(--c-text-light);
    }
    .review-card__stars {
      margin-left: auto;
      color: var(--c-star);
      font-size: 1rem;
      letter-spacing: 1px;
      white-space: nowrap;
    }
    .review-card__comment {
      font-size: .9375rem;
      line-height: 1.65;
      color: var(--c-text);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .reviews-empty {
      font-size: .9rem;
      color: var(--c-text-muted);
      padding: 16px 0;
    }
    .load-more-wrap {
      margin-top: 16px;
      text-align: center;
    }

    @media (max-width: 600px) {
      .reviews-form-card { padding: 20px 18px; }
      .review-star { font-size: 1.7rem; }
      .review-card { padding: 16px 18px; }
    }
  </style>
</head>
<body>

  <nav class="nav"></nav>

  <div class="container">
    <a href="catalog.html" class="back-link">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      <span data-i18n="place.back">Все места</span>
    </a>
  </div>

  <!-- skeleton -->
  <div class="container place-skeleton" id="skeleton">
    <div class="place-layout">
      <div>
        <div class="skeleton place-skeleton__img"></div>
        <div class="skeleton" style="height:16px;width:80%;border-radius:4px;margin-bottom:8px"></div>
        <div class="skeleton" style="height:16px;width:65%;border-radius:4px"></div>
      </div>
      <div>
        <div class="skeleton" style="height:12px;width:40%;border-radius:4px;margin-bottom:10px"></div>
        <div class="skeleton" style="height:32px;width:90%;border-radius:4px;margin-bottom:20px"></div>
        <div class="skeleton" style="height:12px;width:70%;border-radius:4px;margin-bottom:12px"></div>
        <div class="skeleton" style="height:44px;width:100%;border-radius:4px"></div>
      </div>
    </div>
  </div>

  <!-- content -->
  <div class="container hidden" id="content">
    <div class="place-layout">
      <!-- left -->
      <div>
        <div class="gallery" id="gallery"></div>
        <div class="place-description" id="description"></div>

        <div class="model-section hidden" id="model-section">
          <p class="model-section__label" data-i18n="place.model3d">3D-модель</p>
          <div class="model-wrapper" id="model-wrapper"></div>
        </div>
      </div>

      <!-- right sidebar -->
      <aside class="place-meta">
        <p class="place-meta__eyebrow" data-i18n="place.eyebrow">Памятное место</p>
        <h1 class="place-meta__title" id="meta-title"></h1>
        <a href="#" class="place-epoch hidden" id="meta-epoch"></a>

        <div class="meta-row hidden" id="meta-location">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          <div><strong data-i18n="place.location">Расположение</strong><br><span id="meta-address"></span></div>
        </div>

        <div class="meta-row hidden" id="meta-opening-address-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>
          <div><strong data-i18n="place.openingAddress">Адрес открытия</strong><br><span id="meta-opening-address"></span></div>
        </div>

        <div class="meta-row hidden" id="meta-date-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <div><strong data-i18n="place.createdOn">Создан / открыт</strong><br><span id="meta-date"></span></div>
        </div>

        <div class="meta-row hidden" id="meta-author-row">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <div><strong data-i18n="place.author">Автор / скульптор</strong><br><span id="meta-author"></span></div>
        </div>

        <div class="tags hidden" id="meta-tags"></div>

        <hr class="divider" />

        <div class="place-actions">
          <button class="btn-route" id="btn-route">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
            <span data-i18n="place.route">Проложить маршрут</span>
          </button>
          <button class="btn-share" id="btn-share">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
            <span data-i18n="place.share">Поделиться</span>
          </button>
          <a href="feedback.html" class="btn-share" style="text-decoration:none">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <span data-i18n="place.leaveReview">Оставить отзыв</span>
          </a>
        </div>

        <a class="place-map-link hidden" id="meta-map-link" href="#">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
            <line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/>
          </svg>
          <span data-i18n="place.showOnMap">Показать на карте</span>
        </a>
      </aside>
    </div>
  </div>

  <!-- reviews section -->
  <div class="container reviews-section hidden" id="reviews-section">

    <!-- review form -->
    <div class="reviews-form-card">
      <p class="reviews-form-card__heading" data-i18n="place.reviewHeading">Оставить отзыв</p>

      <div class="form-group">
        <label class="form-label" for="review-name" data-i18n="place.reviewNameLabel">Ваше имя</label>
        <input type="text" id="review-name" class="form-control"
          placeholder="Иван Иванов" maxlength="100" autocomplete="name" data-i18n-placeholder="place.reviewNamePlaceholder" />
      </div>

      <div class="form-group">
        <label class="form-label" for="review-email" data-i18n="place.reviewEmailLabel">Электронная почта</label>
        <input type="email" id="review-email" class="form-control"
          placeholder="you@example.com" maxlength="254" autocomplete="email" />
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="place.reviewRatingLabel">Оценка</label>
        <div class="review-stars" id="review-stars">
          <button type="button" class="review-star" data-v="1">★</button>
          <button type="button" class="review-star" data-v="2">★</button>
          <button type="button" class="review-star" data-v="3">★</button>
          <button type="button" class="review-star" data-v="4">★</button>
          <button type="button" class="review-star" data-v="5">★</button>
        </div>
        <p class="review-rating-text" id="review-rating-text"></p>
      </div>

      <div class="form-group">
        <label class="form-label" for="review-comment" data-i18n="place.reviewCommentLabel">Комментарий</label>
        <textarea id="review-comment" class="form-control"
          placeholder="Поделитесь впечатлениями об этом месте…"
          maxlength="2000" rows="4" data-i18n-placeholder="place.reviewCommentPlaceholder"></textarea>
      </div>

      <div class="review-form-actions">
        <button class="btn btn--primary" id="review-submit-btn" data-i18n="place.reviewSubmit">Отправить</button>
        <span class="form-status" id="review-form-status"></span>
      </div>
    </div>

    <!-- reviews list -->
    <hr class="reviews-divider" />
    <h2 class="reviews-section__title" data-i18n="place.reviewsTitle">Отзывы</h2>
    <div id="reviews-list"></div>
    <div class="load-more-wrap">
      <button class="btn btn--outline hidden" id="load-more-reviews" data-i18n="place.reviewsLoadMore">Показать ещё</button>
    </div>

  </div>

  <!-- error -->
  <div class="container state-error hidden" id="error">
    <h3 data-i18n="place.notFoundTitle">Место не найдено</h3>
    <p data-i18n="place.notFoundText">Возможно, оно было удалено или ссылка устарела.</p>
    <a href="index.html" class="btn btn--outline mt-16" data-i18n="place.notFoundBack">← Вернуться</a>
  </div>

  <!-- lightbox -->
  <div class="lightbox hidden" id="lightbox" role="dialog" aria-modal="true" aria-label="Просмотр изображения">
    <button class="lightbox__close" id="lb-close" aria-label="Закрыть">✕</button>
    <button class="lightbox__prev hidden" id="lb-prev" aria-label="Предыдущее изображение">‹</button>
    <img class="lightbox__img" id="lb-img" src="" alt="" />
    <button class="lightbox__next hidden" id="lb-next" aria-label="Следующее изображение">›</button>
    <span class="lightbox__counter" id="lb-counter"></span>
  </div>

  <script type="application/ld+json" id="place-jsonld">{}</script>

  <footer class="footer">
    <div class="container">
      <div class="footer__inner">
        <span data-i18n="common.copyright">© 2026 Следы прошлого</span>
        <div class="footer__links">
          <a href="map.html" data-i18n="nav.map">Карта</a>
          <a href="feedback.html" data-i18n="nav.feedback">Обратная связь</a>
        </div>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/scroll.js"></script>
  <script type="module" src="js/transitions.js"></script>
  <script type="module" src="js/place.js"></script>
</body>
</html>
