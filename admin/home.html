<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главная — Админ</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .admin-layout {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - var(--nav-h));
    }
    .admin-sidebar {
      border-right: 1px solid var(--c-border);
      padding: 32px 0;
    }
    .admin-sidebar__label {
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      padding: 0 24px;
      margin-bottom: 8px;
    }
    .admin-nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      font-size: .875rem;
      font-weight: 400;
      color: var(--c-text-muted);
      transition: color var(--transition), background var(--transition);
    }
    .admin-nav a:hover, .admin-nav a.active {
      color: var(--c-accent);
      background: var(--c-accent-soft);
    }
    .admin-nav a.active { font-weight: 500; }
    .sidebar-bottom {
      padding: 24px;
      margin-top: 24px;
      border-top: 1px solid var(--c-border);
    }

    .admin-main { padding: 32px 40px; }
    .admin-main__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .admin-main__title {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 600;
    }
    .hint {
      margin: 0 0 22px;
      color: var(--c-text-muted);
      max-width: 80ch;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-xs);
    }
    .card h3 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      margin-bottom: 10px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-1 { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .lang-group-title {
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin: 6px 0 4px;
    }
    .preview {
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--c-surface-warm);
    }
    .preview__img {
      height: 160px;
      background: center/cover no-repeat;
      border-bottom: 1px solid var(--c-border-light);
    }
    .preview__body { padding: 14px 16px; }
    .preview__title { font-family: var(--font-display); font-size: 1.2rem; }
    .preview__sub { margin-top: 6px; color: var(--c-text-muted); font-size: .9rem; line-height: 1.6; }

    .collections {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }
    .collection-item {
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 14px 14px 12px;
      background: var(--c-surface);
    }
    .collection-head {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .collection-head strong { font-weight: 700; }
    .mini-actions { display: inline-flex; gap: 6px; }
    .mini-actions button {
      border: 1px solid var(--c-border);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      background: var(--c-surface);
    }
    .mini-actions button:hover { border-color: var(--c-accent); color: var(--c-accent); background: var(--c-accent-soft); }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 700px) {
      .admin-layout { grid-template-columns: 1fr; }
      .admin-sidebar { display: none; }
      .admin-main { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <nav class="nav"></nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <p class="admin-sidebar__label">Навигация</p>
      <nav class="admin-nav">
        <a href="places.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Места
        </a>
        <a href="home.html" class="active">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Главная
        </a>
        <a href="feedback.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Обратная связь
        </a>
        <a href="reviews.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Отзывы о местах
        </a>
      </nav>
      <div class="sidebar-bottom">
        <button class="btn btn--outline btn--sm btn--full" id="logout-btn">Выйти</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-main__header">
        <h1 class="admin-main__title">Главная</h1>
        <button class="btn btn--primary" id="save-btn">Сохранить</button>
      </div>

      <p class="hint">
        Эта страница редактирует документ Firestore <code style="background:var(--c-accent-soft);padding:2px 6px;border-radius:6px">config/home</code>.
        Изменения сразу отражаются на главной сайта.
      </p>

      <div class="grid">
        <section class="card">
          <h3>Hero</h3>
          <div class="row-1">
            <div class="form-group">
              <label class="form-label" for="hero-image">Hero image URL</label>
              <input class="form-control" id="hero-image" placeholder="https://res.cloudinary.com/.../image.jpg" />
            </div>
            <div class="row">
              <div class="form-group">
                <label class="form-label" for="home-api-enabled">Показывать ссылку API в футере</label>
                <select class="form-control" id="home-api-enabled">
                  <option value="false">Нет</option>
                  <option value="true">Да</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="home-github-url">GitHub URL (опционально)</label>
                <input class="form-control" id="home-github-url" placeholder="https://github.com/user/repo" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="hero-eyebrow-ru">Eyebrow</label>
              <div class="row">
                <input class="form-control" id="hero-eyebrow-ru" maxlength="120" placeholder="RU" />
                <input class="form-control" id="hero-eyebrow-en" maxlength="120" placeholder="EN" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="hero-title-ru">Заголовок (HTML допустим: &lt;em&gt;)</label>
              <div class="row">
                <input class="form-control" id="hero-title-ru" maxlength="200" placeholder="RU" />
                <input class="form-control" id="hero-title-en" maxlength="200" placeholder="EN" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="hero-subtitle-ru">Подзаголовок</label>
              <div class="row">
                <textarea class="form-control" id="hero-subtitle-ru" rows="3" maxlength="500" placeholder="RU"></textarea>
                <textarea class="form-control" id="hero-subtitle-en" rows="3" maxlength="500" placeholder="EN"></textarea>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <h3>Превью</h3>
          <div class="preview">
            <div class="preview__img" id="preview-img" aria-hidden="true"></div>
            <div class="preview__body">
              <div class="preview__title" id="preview-title">—</div>
              <div class="preview__sub" id="preview-sub">—</div>
            </div>
          </div>

          <div class="form-group" style="margin-top:14px">
            <label class="form-label" for="intro-text-ru">Intro text</label>
            <div class="row">
              <textarea class="form-control" id="intro-text-ru" rows="5" maxlength="1200" placeholder="RU"></textarea>
              <textarea class="form-control" id="intro-text-en" rows="5" maxlength="1200" placeholder="EN"></textarea>
            </div>
          </div>
        </section>
      </div>

      <section class="card" style="margin-top:16px">
        <div class="collection-head">
          <h3 style="margin:0">Подборки</h3>
          <div class="mini-actions">
            <button type="button" id="add-collection">+ Добавить</button>
          </div>
        </div>
        <div class="collections" id="collections"></div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="js/home-admin.js"></script>
</body>
</html>
