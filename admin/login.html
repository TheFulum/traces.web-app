<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Админ панель</title>
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      background: var(--c-surface);
      border: 1px solid var(--c-border);
      border-radius: var(--radius-lg);
      padding: 40px;
    }
    .login-card__eyebrow {
      font-size: .75rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 8px;
    }
    .login-card__title {
      font-family: var(--font-display);
      font-size: 1.8rem;
      margin-bottom: 32px;
    }
    .form-status {
      font-size: .8125rem;
      color: var(--c-danger);
      min-height: 18px;
      margin-bottom: 16px;
    }
    .login-card__footer {
      margin-top: 20px;
      font-size: .8125rem;
      color: var(--c-text-muted);
      text-align: center;
    }
    .login-card__footer a {
      color: var(--c-text);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <p class="login-card__eyebrow">Следы прошлого</p>
    <h1 class="login-card__title">Вход</h1>

    <p class="form-status" id="form-status"></p>

    <div class="form-group">
      <label class="form-label" for="email">Электронная почта</label>
      <input
        type="email"
        id="email"
        class="form-control"
        placeholder="admin@example.com"
        autocomplete="email"
      />
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Пароль</label>
      <input
        type="password"
        id="password"
        class="form-control"
        placeholder="••••••••"
        autocomplete="current-password"
      />
    </div>

    <button class="btn btn--primary btn--full" id="login-btn">Войти</button>

    <p class="login-card__footer">
      <a href="../index.html">← На сайт</a>
    </p>
  </div>

  <script type="module" src="js/login.js"></script>
</body>
</html>
