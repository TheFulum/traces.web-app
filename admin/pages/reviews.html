<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Отзывы о местах — Админ</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../css/layout-v2.css" />
</head>
<body>

  <nav class="nav"></nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <p class="admin-sidebar__label">Навигация</p>
      <nav class="admin-nav">
        <a href="dashboard.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="places.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Места
        </a>
        <a href="home.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Главная
        </a>
        <a href="pages.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Страницы
        </a>
        <a href="media.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Медиа
        </a>
        <a href="feedback.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Обратная связь
        </a>
        <a href="reviews.html" class="active">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Отзывы о местах
        </a>
      </nav>
      <div class="sidebar-bottom">
        <button class="btn btn--outline btn--sm btn--full" id="logout-btn">Выйти</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <p class="admin-breadcrumb">Админка / Отзывы о местах</p>
      </div>
      <div class="admin-main__header">
        <h1 class="admin-main__title" data-i18n="admin.reviews.title">Отзывы о местах</h1>
      </div>

      <div class="stats-bar" id="stats-bar">
        <div class="stat">
          <div class="stat__value" id="stat-total">—</div>
          <div class="stat__label" data-i18n="admin.reviews.total">Всего</div>
        </div>
        <div class="stat">
          <div class="stat__value" id="stat-avg">—</div>
          <div class="stat__label" data-i18n="admin.reviews.avgRating">Средняя оценка</div>
        </div>
      </div>

      <div class="filter-row" id="filter-row">
        <button class="filter-btn active" data-rating="0" data-i18n="admin.reviews.filterAll">Все</button>
        <button class="filter-btn" data-rating="5">★★★★★</button>
        <button class="filter-btn" data-rating="4">★★★★</button>
        <button class="filter-btn" data-rating="3">★★★</button>
        <button class="filter-btn" data-rating="2">★★</button>
        <button class="filter-btn" data-rating="1">★</button>
      </div>

      <div class="filter-row" id="status-filter-row">
        <button class="filter-btn active" data-status="all" data-i18n="admin.reviews.filterAllStatus">Все статусы</button>
        <button class="filter-btn" data-status="approved" data-i18n="admin.reviews.filterPublished">Опубликованные</button>
        <button class="filter-btn" data-status="pending" data-i18n="admin.reviews.filterPending">На модерации</button>
        <button class="filter-btn" data-status="rejected" data-i18n="admin.reviews.filterRejected">Отклонённые</button>
      </div>

      <div class="moderation-row">
        <button class="btn btn--outline btn--sm" id="bulk-approve-btn" data-i18n="admin.reviews.bulkApprove">Одобрить выбранные</button>
        <button class="btn btn--outline btn--sm" id="bulk-reject-btn" data-i18n="admin.reviews.bulkReject">Отклонить выбранные</button>
        <button class="btn btn--outline btn--sm" id="bulk-delete-btn" data-i18n="admin.reviews.bulkDelete">Удалить выбранные</button>
      </div>

      <div class="feedback-list" id="reviews-list"></div>
      <div class="state-empty hidden" id="empty-state">
        <h3 data-i18n="admin.reviews.emptyTitle">Отзывов пока нет</h3>
        <p data-i18n="admin.reviews.emptyText">Они появятся здесь, когда пользователи начнут оставлять отзывы о местах.</p>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="../js/shared/admin-shell.js"></script>
  <script type="module" src="../js/pages/reviews.js"></script>
</body>
</html>
