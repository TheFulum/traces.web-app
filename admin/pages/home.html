<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Главная — Админ</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../css/layout-v2.css" />
  <style>
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-items: start;
    }
    .card {
      background: var(--c-surface);
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-xs);
    }
    .card h3 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      margin-bottom: 10px;
    }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .row-1 { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .lang-group-title {
      font-size: .72rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin: 6px 0 4px;
    }
    .preview {
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--c-surface-warm);
    }
    .preview__img {
      height: 160px;
      background: center/cover no-repeat;
      border-bottom: 1px solid var(--c-border-light);
    }
    .preview__body { padding: 14px 16px; }
    .preview__title { font-family: var(--font-display); font-size: 1.2rem; }
    .preview__sub { margin-top: 6px; color: var(--c-text-muted); font-size: .9rem; line-height: 1.6; }

    .collections {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }
    .collection-item {
      border: 1px solid var(--c-border-light);
      border-radius: var(--radius-lg);
      padding: 14px 14px 12px;
      background: var(--c-surface);
    }
    .collection-head {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .collection-head strong { font-weight: 700; }
    .mini-actions { display: inline-flex; gap: 6px; }
    .mini-actions button {
      border: 1px solid var(--c-border);
      border-radius: 10px;
      padding: 6px 10px;
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--c-text-muted);
      background: var(--c-surface);
    }
    .mini-actions button:hover { border-color: var(--c-accent); color: var(--c-accent); background: var(--c-accent-soft); }

    @media (max-width: 920px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <nav class="nav"></nav>

  <div class="admin-layout">
    <aside class="admin-sidebar">
      <p class="admin-sidebar__label">Навигация</p>
      <nav class="admin-nav">
        <a href="dashboard.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="14" width="7" height="7"/></svg>
          Dashboard
        </a>
        <a href="places.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          Места
        </a>
        <a href="home.html" class="active">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Главная
        </a>
        <a href="pages.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          Страницы
        </a>
        <a href="media.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
          Медиа
        </a>
        <a href="feedback.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          Обратная связь
        </a>
        <a href="reviews.html">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          Отзывы о местах
        </a>
      </nav>
      <div class="sidebar-bottom">
        <button class="btn btn--outline btn--sm btn--full" id="logout-btn">Выйти</button>
      </div>
    </aside>

    <main class="admin-main">
      <div class="admin-topbar">
        <p class="admin-breadcrumb">Админка / Главная</p>
      </div>
      <div class="admin-main__header">
        <h1 class="admin-main__title" data-i18n="admin.home.title">Главная</h1>
        <button class="btn btn--primary" id="save-btn" data-i18n="admin.home.save">Сохранить</button>
      </div>

      <p class="admin-hint" data-i18n-html="admin.home.hint">
        Эта страница редактирует документ Firestore <code>config/home</code>.
        Изменения сразу отражаются на главной сайта.
      </p>

      <div class="grid">
        <section class="card">
          <h3>Hero</h3>
          <div class="row-1">
            <div class="form-group">
              <label class="form-label" for="hero-image">Hero image URL</label>
              <input class="form-control" id="hero-image" placeholder="https://res.cloudinary.com/.../image.jpg" />
            </div>
            <div class="row">
              <div class="form-group">
                <label class="form-label" for="home-api-enabled" data-i18n="admin.home.apiLabel">Показывать ссылку API в футере</label>
                <select class="form-control" id="home-api-enabled">
                  <option value="false" data-i18n="admin.home.apiNo">Нет</option>
                  <option value="true" data-i18n="admin.home.apiYes">Да</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="home-github-url" data-i18n="admin.home.githubLabel">GitHub URL (опционально)</label>
                <input class="form-control" id="home-github-url" placeholder="https://github.com/user/repo" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="hero-eyebrow-ru">Eyebrow</label>
              <div class="row">
                <input class="form-control" id="hero-eyebrow-ru" maxlength="120" placeholder="RU" />
                <input class="form-control" id="hero-eyebrow-en" maxlength="120" placeholder="EN" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="hero-title-ru" data-i18n="admin.home.heroTitle">Заголовок (HTML допустим: &lt;em&gt;)</label>
              <div class="row">
                <input class="form-control" id="hero-title-ru" maxlength="200" placeholder="RU" />
                <input class="form-control" id="hero-title-en" maxlength="200" placeholder="EN" />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label" for="hero-subtitle-ru" data-i18n="admin.home.heroSubtitle">Подзаголовок</label>
              <div class="row">
                <textarea class="form-control" id="hero-subtitle-ru" rows="3" maxlength="500" placeholder="RU"></textarea>
                <textarea class="form-control" id="hero-subtitle-en" rows="3" maxlength="500" placeholder="EN"></textarea>
              </div>
            </div>
          </div>
        </section>

        <section class="card">
          <h3>Превью</h3>
          <div class="preview">
            <div class="preview__img" id="preview-img" aria-hidden="true"></div>
            <div class="preview__body">
              <div class="preview__title" id="preview-title">—</div>
              <div class="preview__sub" id="preview-sub">—</div>
            </div>
          </div>

          <div class="form-group" style="margin-top:14px">
            <label class="form-label" for="intro-text-ru">Intro text</label>
            <div class="row">
              <textarea class="form-control" id="intro-text-ru" rows="5" maxlength="1200" placeholder="RU"></textarea>
              <textarea class="form-control" id="intro-text-en" rows="5" maxlength="1200" placeholder="EN"></textarea>
            </div>
          </div>
        </section>
      </div>

      <section class="card" style="margin-top:16px">
        <div class="collection-head">
          <h3 style="margin:0">Подборки</h3>
          <div class="mini-actions">
            <button type="button" id="add-collection" data-i18n="admin.home.addCollection">+ Добавить</button>
          </div>
        </div>
        <div class="collections" id="collections"></div>
      </section>

      <section class="card" style="margin-top:16px">
        <h3 style="margin:0 0 12px" data-i18n="admin.home.teasers">Тизеры: Карта и гид</h3>
        <div class="row">
          <div class="form-group">
            <label class="form-label" for="teaser-map-image" data-i18n="admin.home.teaserMap">Карта — image URL</label>
            <input
              class="form-control"
              id="teaser-map-image"
              placeholder="https://res.cloudinary.com/.../map-teaser.jpg"
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="teaser-guide-image" data-i18n="admin.home.teaserGuide">Гид — image URL</label>
            <input
              class="form-control"
              id="teaser-guide-image"
              placeholder="https://res.cloudinary.com/.../guide-teaser.jpg"
            />
          </div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <script type="module" src="../js/shared/admin-shell.js"></script>
  <script type="module" src="../js/pages/home.js"></script>
</body>
</html>
