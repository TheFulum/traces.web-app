<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Админ панель</title>
  <link rel="icon" href="../../assets/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../css/style.css" />
  <link rel="stylesheet" href="../css/layout-v2.css" />
</head>
<body>
  <nav class="nav"></nav>

  <div class="admin-auth">
    <div class="admin-login-card">
      <p class="admin-login-card__eyebrow">Админка · Следы прошлого</p>
      <h1 class="admin-login-card__title">Вход</h1>

      <p class="admin-login-card__status" id="form-status" role="status" aria-live="polite"></p>

      <div class="form-group">
        <label class="form-label" for="email">Электронная почта</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="admin@example.com"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Пароль</label>
        <input
          type="password"
          id="password"
          class="form-control"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button class="btn btn--primary btn--full" id="login-btn">Войти</button>

      <p class="admin-login-card__footer">
        <a href="../../index.html">← На сайт</a>
      </p>
    </div>
  </div>

  <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
